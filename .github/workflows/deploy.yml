name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./documentation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build website
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./documentation/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check Pages availability
        id: pages_check
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.getPages({
                owner: context.repo.owner,
                repo: context.repo.repo,
              })
              core.setOutput('enabled', 'true')
            } catch (error) {
              if (error.status === 404) {
                core.warning('GitHub Pages is not enabled for this repository or is blocked by policy. Skipping deploy step.')
                core.setOutput('enabled', 'false')
              } else {
                throw error
              }
            }

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.pages_check.outputs.enabled == 'true'
        uses: actions/deploy-pages@v4

      - name: Deployment skipped notice
        if: steps.pages_check.outputs.enabled != 'true'
        run: echo "Skipping GitHub Pages deploy: Pages is not enabled or allowed by policy."
